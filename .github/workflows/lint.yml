# SPDX-License-Identifier: AGPL-3.0-or-later
name: Lint & test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov
          ini-values: pcov.directory=${{ github.workspace }}
      - run: composer install --no-progress
      - name: PHP syntax lint
        run: composer run lint
      - name: Coding standard
        run: composer run cs:check
      - name: Psalm
        run: composer run psalm
      - name: Unit tests (with coverage)
        run: composer run test:coverage
      - name: Upload PHP coverage
        if: matrix.php-version == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: coverage.xml
          if-no-files-found: warn
      - name: Coverage report (backend)
        if: matrix.php-version == '8.3' && always()
        run: |
          if [ -f coverage.txt ]; then
            {
              echo "### Backend coverage (PHPUnit · PHP 8.3)"
              echo '```'
              awk '/Summary:/{f=1} f{print} /Lines:/{exit}' coverage.txt
              echo '```'
            } | tee coverage-backend.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment backend coverage on PR
        if: matrix.php-version == '8.3' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-backend
          path: coverage-backend.md

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run stylelint
      - name: Type-check (vue-tsc)
        run: npm run type-check
      - name: Unit tests (with coverage)
        run: npm run test:coverage
      - name: Upload JS coverage
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: coverage/lcov.info
          if-no-files-found: warn
      - name: Coverage report (frontend)
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            {
              echo "### Frontend coverage (Vitest)"
              echo "| Metric | % |"
              echo "|---|---|"
              jq -r '.total | "| Lines | \(.lines.pct)% |\n| Statements | \(.statements.pct)% |\n| Functions | \(.functions.pct)% |\n| Branches | \(.branches.pct)% |"' coverage/coverage-summary.json
            } | tee coverage-frontend.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment frontend coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-frontend
          path: coverage-frontend.md
      - name: Build production bundle
        run: npm run build

  # Install the app on each supported database and run the migrations — the
  # reproducible version of the cross-DB matrix in docs/PORTABILITY.md.
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        db: [sqlite, mysql, pgsql]
    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: nextcloud
          MARIADB_USER: nextcloud
          MARIADB_PASSWORD: nextcloud
        ports: ['4444:3306']
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s --health-timeout=3s --health-retries=15
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nextcloud
          POSTGRES_USER: nextcloud
          POSTGRES_PASSWORD: nextcloud
        ports: ['4445:5432']
        options: >-
          --health-cmd=pg_isready --health-interval=5s --health-timeout=3s --health-retries=15
    steps:
      - name: Checkout Nextcloud server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          ref: v32.0.6
          submodules: true
          path: nextcloud
      - name: Checkout the app
        uses: actions/checkout@v4
        with:
          path: nextcloud/apps/dataforms
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, iconv, fileinfo, intl, pdo_sqlite, pdo_mysql, pdo_pgsql, gd, zip, bz2, curl
          coverage: none
      - name: Install runtime deps
        working-directory: nextcloud/apps/dataforms
        run: composer install --no-dev --no-progress || true
      - name: Install Nextcloud (${{ matrix.db }})
        working-directory: nextcloud
        run: |
          case "${{ matrix.db }}" in
            mysql) ARGS="--database mysql --database-host 127.0.0.1:4444 --database-name nextcloud --database-user nextcloud --database-pass nextcloud" ;;
            pgsql) ARGS="--database pgsql --database-host 127.0.0.1:4445 --database-name nextcloud --database-user nextcloud --database-pass nextcloud" ;;
            *)     ARGS="--database sqlite" ;;
          esac
          php occ maintenance:install --admin-user admin --admin-pass admin $ARGS
      - name: Enable app (applies all migrations)
        working-directory: nextcloud
        run: php occ app:enable dataforms
      - name: Smoke — app enabled & migrations applied
        working-directory: nextcloud
        run: |
          php occ app:list | grep -A1 -i dataforms
          php occ app:enable dataforms 2>&1 | grep -qi "already enabled\|enabled"

  # The real PR gate: every line changed in this PR must be covered (front +
  # back). Merges the PHP (clover) and JS (lcov) reports from the jobs above.
  diff-coverage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [php, frontend]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch --no-tags origin ${{ github.base_ref }}
      - uses: actions/download-artifact@v4
        with:
          name: php-coverage
          path: cov-php
      - uses: actions/download-artifact@v4
        with:
          name: js-coverage
          path: cov-js
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install "diff-cover>=9"
      - name: Diff coverage — changed lines must be 100% covered
        run: |
          diff-cover cov-php/coverage.xml cov-js/lcov.info \
            --compare-branch origin/${{ github.base_ref }} \
            --fail-under 100 \
            --markdown-report diff-cover.md
      - name: Comment diff coverage on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: diff-coverage
          path: diff-cover.md
