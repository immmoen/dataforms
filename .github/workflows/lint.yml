# SPDX-License-Identifier: AGPL-3.0-or-later
name: Lint & test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  php:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: pcov
          ini-values: pcov.directory=${{ github.workspace }}
      - run: composer install --no-progress
      - name: PHP syntax lint
        run: composer run lint
      - name: Coding standard
        run: composer run cs:check
      - name: Psalm
        run: composer run psalm
      - name: Unit tests (with coverage)
        run: composer run test:coverage
      - name: Upload PHP coverage
        if: matrix.php-version == '8.3'
        uses: actions/upload-artifact@v4
        with:
          name: php-coverage
          path: coverage.xml
          if-no-files-found: warn
      - name: Coverage report (backend)
        if: matrix.php-version == '8.3' && always()
        run: |
          if [ -f coverage.txt ]; then
            {
              echo "### Backend coverage (PHPUnit · PHP 8.3)"
              echo '```'
              awk '/Summary:/{f=1} f{print} /Lines:/{exit}' coverage.txt
              echo '```'
            } | tee coverage-backend.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment backend coverage on PR
        if: matrix.php-version == '8.3' && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-backend
          path: coverage-backend.md

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run stylelint
      - name: Type-check (vue-tsc)
        run: npm run type-check
      - name: Unit tests (with coverage)
        run: npm run test:coverage
      - name: Upload JS coverage
        uses: actions/upload-artifact@v4
        with:
          name: js-coverage
          path: coverage/lcov.info
          if-no-files-found: warn
      - name: Coverage report (frontend)
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            {
              echo "### Frontend coverage (Vitest)"
              echo "| Metric | % |"
              echo "|---|---|"
              jq -r '.total | "| Lines | \(.lines.pct)% |\n| Statements | \(.statements.pct)% |\n| Functions | \(.functions.pct)% |\n| Branches | \(.branches.pct)% |"' coverage/coverage-summary.json
            } | tee coverage-frontend.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Comment frontend coverage on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-frontend
          path: coverage-frontend.md
      - name: Build production bundle
        run: npm run build

  # Install the app on each supported database and run the migrations — the
  # reproducible version of the cross-DB matrix in docs/PORTABILITY.md. Extracted
  # into a reusable workflow so the nightly stage runs the identical matrix.
  integration:
    uses: ./.github/workflows/integration.yml

  # Fast PR-gate Playwright smoke: one core flow (@smoke) through the SPA against
  # a real, seeded Nextcloud. The full e2e suite runs in the nightly stage.
  e2e-smoke:
    uses: ./.github/workflows/e2e.yml
    with:
      grep: '@smoke'

  # The real PR gate: every line changed in this PR must be covered (front +
  # back). Merges the PHP (clover) and JS (lcov) reports from the jobs above.
  diff-coverage:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [php, frontend, integration]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base branch
        run: git fetch --no-tags origin ${{ github.base_ref }}
      - uses: actions/download-artifact@v4
        with:
          name: php-coverage
          path: cov-php
      - uses: actions/download-artifact@v4
        with:
          name: js-coverage
          path: cov-js
      # Mapper coverage is measured only by the integration suite (sqlite leg);
      # the gate unions it with the unit clover so a touched mapper is judged on
      # its real, integration-tested coverage.
      - uses: actions/download-artifact@v4
        with:
          name: php-integration-coverage
          path: cov-php-int
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install "diff-cover>=9"
      # Informative per-line view (not the gate — gate B below is authoritative).
      - name: Diff coverage report (changed lines, informative)
        run: |
          set +e
          diff-cover cov-php/coverage.xml --compare-branch origin/${{ github.base_ref }} \
            --format markdown:diff-cover-php.md
          diff-cover cov-js/lcov.info --compare-branch origin/${{ github.base_ref }} \
            --format markdown:diff-cover-js.md
          {
            echo "## Diff coverage (changed lines — informative)"
            echo "### Backend (PHP)"; cat diff-cover-php.md 2>/dev/null || echo "_no report_"
            echo "### Frontend (JS)"; cat diff-cover-js.md 2>/dev/null || echo "_no report_"
          } | tee diff-cover.md >> "$GITHUB_STEP_SUMMARY"
          true
      # The PR gate (docs/DECISIONS.md "gate B"): every PRODUCTION file *touched*
      # in this PR must be 100% covered — the whole file, not just changed lines.
      - name: Gate B — every touched file must be 100% covered
        run: |
          set -o pipefail  # otherwise tee masks the script's exit code
          python3 .github/scripts/touched_files_coverage.py \
            --base origin/${{ github.base_ref }} \
            --clover cov-php/coverage.xml \
            --clover cov-php-int/coverage-integration.xml \
            --lcov cov-js/lcov.info | tee gate-b.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment coverage on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: diff-coverage
          path: gate-b.md
